<!DOCTYPE html>
<html lang="en" data-game="penalty">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goalworld — Penalty Shootout</title>
    <!--
      Wrapper dedicado para embeber el PenaltyGame dentro del modal de
      ARCADE de goalworld_webapp (via <VanillaMount> iframe).
      Aísla el juego de la landing: sólo carga tokens + el canvas + el script.
    -->
    <link rel="stylesheet" href="../assets/css/tokens.css?v=1.0">
    <link rel="stylesheet" href="../assets/css/style.css?v=4.3">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* Layout limpio para el iframe embebido. */
        html, body {
            margin: 0;
            padding: 0;
            background: var(--gc-bg);
            color: var(--gc-text);
            font-family: var(--gc-font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: var(--gc-space-4, 1rem);
            overflow-x: hidden;
        }
        .game-frame {
            width: 100%;
            max-width: 720px;
            padding: var(--gc-space-4, 1rem);
            box-sizing: border-box;
        }
        /* El penalty_game.js espera un <canvas id="gameCanvas"> con tamaño fijo. */
        #gameCanvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
            border-radius: var(--gc-radius-lg, 16px);
            background: #050509;
            box-shadow: var(--gc-glow-green);
            touch-action: none;
        }
        .game-hint {
            font-size: var(--gc-fs-sm, 0.9rem);
            color: var(--gc-text-dim);
            text-align: center;
            padding: 0 var(--gc-space-4, 1rem) var(--gc-space-5, 1.5rem);
        }
        .lang-toggle { display: flex; gap: 6px; justify-content: center; margin-top: 0.5rem; }
        .lang-toggle button { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: var(--gc-text-dim, #94a3b8); padding: 4px 12px; border-radius: 999px; font-weight: 800; font-size: 0.72rem; cursor: pointer; }
        .lang-toggle button.active { background: var(--primary, #14f195); color: #030307; border-color: var(--primary, #14f195); }
    </style>
</head>
<body>
    <div class="game-frame">
        <canvas id="gameCanvas" width="800" height="420"></canvas>
    </div>
    <p class="game-hint" data-i18n="penalty_hint">Tap a zone of the goal to shoot.</p>
    <div class="lang-toggle">
        <button id="langEs" onclick="setLang('es')">ES</button>
        <button id="langEn" class="active" onclick="setLang('en')">EN</button>
    </div>

    <!-- i18n se carga por consistencia (algunos textos del juego lo usan). -->
    <script src="../assets/js/i18n.js?v=3.0"></script>
    <script src="../assets/js/penalty_game.js?v=4.0"></script>
    <!-- Puente postMessage hacia la webapp de React (eventos de juego). -->
    <script src="../assets/js/arcade_bridge.js?v=1.0"></script>
</body>
</html>
